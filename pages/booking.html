    <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="booking-page">
    <header>
        <div class="social-icons">
            <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
        </div>
        <div class="hero-image-container">
            <img class="hero-image" src="../imgs/HCC_Hero-removebg-preview.png" alt="Henderson Country Club Hero Photo">
            <a href="../index.html" class="home-btn"></a>
        </div>
        <a href="tel:5555551234" class="phone-number"> &#128222; (555) 555-1234</a>
        <a class="header-btn" href="../pages/booking.html">Request Tee Time</a>
        <a class="header-btn" href="../pages/pricing.html">Pricing</a>
        <button class="navbar-btn">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav class="navbar">
            <ul>
                <li><a href="../index.html" class="nav-link">Home</a></li>
                <li><a href="../pages/booking.html" class="nav-link">Request Tee Time</a></li>
                <li><a href="../pages/pricing.html" class="nav-link">Pricing</a></li>
                <li><a href="../pages/membership.html" class="nav-link">Membership</a></li>
                <li><a href="../pages/events.html" class="nav-link">Events</a></li>
                <li><a href="../pages/restaurant.html" class="nav-link">Restaurant</a></li>
                <li><a href="../pages/gallery.html" class="nav-link">Gallery</a></li>
            </ul>
        </nav>
    </header>
    <main>

        <section class="booking-form">
            <h2>Request Tee Time</h2>
            <form action="https://formspree.io/f/mrerkeyb" method="post">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" required>

                <label for="date">Preferred Date:</label>
                <input type="date" id="date" name="date" required>

                <label for="time">Preferred Time:</label>
                <input type="time" id="time" name="time" required>

                <label for="players">Number of Players:</label>
                <input type="number" id="players" name="players" min="1" max="4" required>

                <label for="flexible">Flexible with Date/Time?</label>
                <select id="flexible" name="flexible">
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>

                <button type="submit">Submit</button>
            </form>
        </section>

        <section class="spacer">
            <svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#caa75e"/>
                        <stop offset="50%" stop-color="#f5e1a4"/>
                        <stop offset="100%" stop-color="#b68a2c"/>
                    </linearGradient>
                </defs>

                <path d="M0,100 C150,50 250,150 400,120 S650,50 800,120"
                    stroke="url(#gold)"
                    stroke-width="6"
                    fill="none"/>

                <path d="M0,105 C150,170 250,70 400,100 S650,170 800,110"
                    stroke="url(#gold)"
                    stroke-width="3"
                    fill="none"
                    opacity="0.7"/>
            </svg>

        </section>
    </main>
    <script src="../js/script.js"></script>
</body>
